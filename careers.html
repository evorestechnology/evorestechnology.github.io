<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Join EvoRES Technology LLP. Explore career opportunities in our innovative PaaS solutions company. We're hiring talented engineers and product specialists.">
    <meta name="keywords" content="Careers, Jobs, EvoRES Technology, PaaS, Engineering Careers, India Tech Jobs">
    <meta name="author" content="EvoRES Technology LLP">
    <meta property="og:title" content="Careers | EvoRES Technology LLP">
    <meta property="og:description"
        content="Join EvoRES Technology LLP. Explore career opportunities in our innovative PaaS solutions company.">
    <meta property="og:url" content="https://evorestechnology.com/careers.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <title>Careers | EvoRES Technology LLP</title>
    <link rel="icon" type="image/png" href="./images/favicon.png" sizes="256x256">
    <link rel="shortcut icon" href="./images/favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@100;300;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- PAGE SPECIFIC STYLES --- */
        .hero {
            padding-top: 100px;
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .hero h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(1.8rem, 6vw, 4rem);
            letter-spacing: clamp(5px, 2vw, 15px);
            text-transform: uppercase;
            color: #fff;
        }

        .career-section {
            padding: 40px 10% 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .filter-container {
            display: flex;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .filter-container input,
        .filter-container select {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 12px 20px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 200px;
        }

        .filter-container select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 15px;
        }

        .filter-container input:focus,
        .filter-container select:focus {
            border-color: #d4af37;
        }

        .job-card {
            background: #080808;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .job-card:hover {
            background: #111;
            border-color: #fff;
            transform: translateX(10px);
        }

        .job-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .job-tag {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 4px 12px;
            border: 1px solid #333;
            color: #888;
        }

        .tag-important {
            color: #d4af37;
            border-color: rgba(212, 175, 55, 0.3);
        }

        .tag-id {
            color: #00aaff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: #000;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            padding: 60px;
            border: 1px solid #333;
            position: relative;
            overflow-y: auto;
        }

        .modal-body strong {
            display: block;
            margin-top: 30px;
            margin-bottom: 12px;
            color: #fff;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            border-left: 2px solid #d4af37;
            padding-left: 15px;
        }

        .modal-body p {
            font-size: 0.95rem;
            color: #ccc;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        /* --- NOTIFICATION CONTAINER --- */
        .notification-container {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #080808;
            border: 1px solid #d4af37;
            padding: 20px 30px;
            z-index: 9999;
            width: max-content;
            max-width: 90%;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
        }

        .notification-container p {
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
        }

        .notification-container a {
            color: #d4af37;
            text-decoration: underline;
        }

        .notification-btn {
            padding: 10px 25px;
            background: #d4af37;
            color: #000;
            border: none;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: opacity 0.3s;
        }

        .notification-btn:hover {
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .career-section {
                padding: 40px 5%;
            }

            .modal-content {
                padding: 30px;
            }

            .job-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="logo-container">
            <img src="./images/EvoRES logo.png" alt="EvoRES Logo" class="logo-img">
            <span class="logo-text">
                E<span class="brand-vo"><b>vo</b></span>RES
                <br class="logo-break">
                TECHNOLOGY LLP
            </span>
        </a>
        <div class="nav-links">
            <a href="index.html#about">About</a>
            <a href="index.html#mission">Mission</a>
            <a href="index.html#products">Products</a>
            <a href="team.html">Our Team</a>
            <a href="careers.html">Careers</a>
            <a href="index.html#contact">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <h1>CAREERS</h1>
    </header>

    <section class="career-section">
        <div class="filter-container">
            <input type="text" id="jobSearch" placeholder="SEARCH POSITIONS...">
            <select id="modeFilter">
                <option value="all">ALL MODES</option>
            </select>
            <select id="typeFilter">
                <option value="all">ALL TYPES</option>
            </select>
            <select id="locationFilter">
                <option value="all">ALL LOCATIONS</option>
            </select>
        </div>

        <div id="jobList" class="job-grid"></div>
    </section>

    <div class="modal-overlay" id="jobModal">
        <div class="modal-content">
            <span onclick="closeModal()"
                style="position:absolute; top:30px; right:30px; cursor:pointer; font-size:2rem; opacity:0.5; color:#fff;">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="globalNotification" class="notification-container">
        <p id="notificationMsg"></p>
        <button class="notification-btn" onclick="closeNotification()">OK</button>
    </div>

    <footer>
        <div class="footer-logo"><b>E<span class="brand-vo">vo</span>RES TECHNOLOGY LLP</b></div>
        <p style="font-size: 0.6rem; letter-spacing: 3px; margin-top: 20px; opacity: 0.3;">© 2026 EvoRES TECHNOLOGY LLP
        </p>
    </footer>

    <script>
        let jobsData = [];

        const filterState = {
            search: "",
            mode: "all",
            type: "all",
            location: "all"
        };

        function normalize(value) {
            if (!value) return '';
            return value.toLowerCase().trim().replace(/\s+/g, '-');
        }

        function isValid(value) {
            return value && value.trim() !== '';
        }

        // Safely converts strings (from Sheets) or arrays (from JSON) into bullet points
        function parseList(data) {
            if (!data) return [];
            if (Array.isArray(data)) return data;
            if (typeof data === 'string') {
                return data.split(/\n/).map(item => item.replace(/^[•\-\*]\s*/, '').trim()).filter(item => item !== '');
            }
            return [];
        }

        async function loadCareers() {
            const container = document.getElementById('jobList');

            // 1. Inject Loading Spinner dynamically
            container.innerHTML = `
                <div style="grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; padding: 80px 0;">
                    <div style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #d4af37; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                    <p style="margin-top: 20px; font-family: 'Syncopate', sans-serif; font-size: 0.7rem; letter-spacing: 3px; color: #888;">LOADING POSITIONS...</p>
                    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
                </div>
            `;

            const remoteApiUrl = 'https://script.google.com/macros/s/AKfycbz1M67rUOVyZiajZNRSpstarChU6pWy3P9rkxqmSFiug6yWJVl1EOuUVX4-fwuwS3sTrQ/exec';
            const localJsonUrl = 'careers.json';

            let rawResponse = null;

            try {
                // ATTEMPT 1: Fetch from Web API
                console.log("[Status] Attempting to fetch data from Web API...");
                try {
                    const response = await fetch(remoteApiUrl, { redirect: "follow" });
                    if (!response.ok) throw new Error(`API responded with status: ${response.status}`);
                    rawResponse = await response.json();
                    console.log("[Success] Data fetched from Web API successfully.");
                } catch (apiError) {
                    // ATTEMPT 2: Fallback to local JSON
                    console.warn("[Warning] Web API fetch failed. Reason:", apiError.message);
                    console.log("[Status] Falling back to local JSON file...");

                    const localResponse = await fetch(localJsonUrl);
                    if (!localResponse.ok) throw new Error(`Local JSON missing or responded with status: ${localResponse.status}`);
                    rawResponse = await localResponse.json();
                    console.log("[Success] Data fetched from local JSON file successfully.");
                }

                // Ensure data is an array (handle different JSON wrappers)
                const dataArray = Array.isArray(rawResponse) ? rawResponse : (rawResponse?.data || []);

                if (dataArray.length === 0) {
                    console.warn("[Warning] The fetched data array is empty.");
                } else {
                    console.log(`[Debug] Raw Data received: ${dataArray.length} items.`);
                }

                // Map Sheet Headers & JSON Keys
                jobsData = dataArray
                    .filter(job => {
                        // Supports both proper JSON boolean or Google Sheet "Active" text
                        const status = job.Status !== undefined ? job.Status : (job.status !== undefined ? job.status : job.active);
                        return status === true || String(status).toLowerCase() === 'active';
                    })
                    .map(job => ({
                        id: job.ID !== undefined ? job.ID : job.id,
                        title: job['Job Title'] || job.title || 'Untitled Position',
                        description: job.Description || job.description || '',
                        mode: job.Mode || job.mode || '',
                        type: job.Type || job.type || '',
                        location: job.Location || job.location || '',
                        applyUrl: job['Form Link'] || job.applyUrl || '',

                        // Use parseList for all array-based outputs
                        requirements: parseList(job.Requirements || job.requirements),
                        expectations: parseList(job.Expectations || job.expectations),
                        workOn: parseList(job['Work Responsibilities'] || job.workOn),
                        growthPath: parseList(job['Growth Path'] || job.growthPath),

                        modeNorm: normalize(job.Mode || job.mode),
                        typeNorm: normalize(job.Type || job.type),
                        locationNorm: normalize(job.Location || job.location)
                    }));

                console.log(`[Debug] Active Jobs to render: ${jobsData.length} items.`, jobsData);

                generateDynamicFilters(jobsData);
                displayJobs(jobsData);
                checkUrlForJob();

            } catch (error) {
                console.error("[Critical Error] Both remote and local data sources failed.", error);
                container.innerHTML = `
                    <div style="text-align:center; padding: 60px; grid-column: 1/-1; border: 1px dashed #222;">
                        <p style="opacity:0.4; font-family:'Syncopate'; font-size: 0.7rem; letter-spacing: 2px;">
                            UNABLE TO LOAD OPPORTUNITIES. PLEASE TRY AGAIN LATER.
                        </p>
                    </div>`;
            }
        }

        function handleFilters() {
            filterState.search = document.getElementById('jobSearch').value.toLowerCase();
            filterState.mode = document.getElementById('modeFilter').value;
            filterState.type = document.getElementById('typeFilter').value;
            filterState.location = document.getElementById('locationFilter').value;

            const filtered = jobsData.filter(job => {
                const matchesSearch = job.title.toLowerCase().includes(filterState.search);
                const matchesMode = filterState.mode === 'all' || job.modeNorm === filterState.mode;
                const matchesType = filterState.type === 'all' || job.typeNorm === filterState.type;
                const matchesLoc = filterState.location === 'all' || job.locationNorm === filterState.location;

                return matchesSearch && matchesMode && matchesType && matchesLoc;
            });

            displayJobs(filtered);
        }

        function generateDynamicFilters(data) {
            const buildOptions = (keyNorm, keyOriginal) => {
                const uniqueValues = new Map();
                data.forEach(job => {
                    if (isValid(job[keyOriginal])) {
                        uniqueValues.set(job[keyNorm], job[keyOriginal]);
                    }
                });
                return uniqueValues;
            };

            const populateSelect = (id, optionsMap, label) => {
                const select = document.getElementById(id);
                let html = `<option value="all">ALL ${label}</option>`;
                optionsMap.forEach((original, norm) => {
                    html += `<option value="${norm}">${original.toUpperCase()}</option>`;
                });
                select.innerHTML = html;
            };

            populateSelect('modeFilter', buildOptions('modeNorm', 'mode'), 'MODES');
            populateSelect('typeFilter', buildOptions('typeNorm', 'type'), 'TYPES');
            populateSelect('locationFilter', buildOptions('locationNorm', 'location'), 'LOCATIONS');
        }

        function displayJobs(jobs) {
            const container = document.getElementById('jobList');

            if (jobs.length === 0) {
                container.innerHTML = `
                <div style="text-align:center; padding: 60px; grid-column: 1/-1; border: 1px dashed #222;">
                    <p style="opacity:0.4; font-family:'Syncopate'; font-size: 0.7rem; letter-spacing: 2px;">
                        CHECK BACK SOON FOR NEW OPPORTUNITIES.
                    </p>
                </div>`;
                return;
            }

            container.innerHTML = jobs.map(job => `
                <div class="job-card" onclick="openModal('${job.id}')">
                    <div style="width: 100%;">
                        
                        <div class="job-title" style="font-family:'Syncopate'; letter-spacing:2px; font-size:1.1rem; color:#fff;">
                            ${job.title}
                        </div>

                        <div class="job-meta">
                            <span class="job-tag tag-id">ID: ${job.id}</span>
                            ${isValid(job.mode) ? `<span class="job-tag tag-important">${job.mode}</span>` : ''}
                            ${isValid(job.type) ? `<span class="job-tag">${job.type}</span>` : ''}
                            ${job.modeNorm !== 'remote' && isValid(job.location) ? `<span class="job-tag" style="opacity:0.5;">${job.location}</span>` : ''}
                        </div>
                        
                    </div>
                    <div style="font-size: 1.2rem; opacity: 0.3; color:#fff;">→</div>
                </div>
            `).join('');
        }

        function openModal(jobId) {
            // String comparison safely matches IDs regardless of type
            const job = jobsData.find(j => String(j.id) === String(jobId));
            if (!job) return;

            const content = document.getElementById('modalContent');

            const renderList = (title, items) => {
                if (!items || items.length === 0) return '';
                return `
                    <strong> ${title}</strong>
                    <p>${items.map(item => `• ${item}`).join('<br>')}</p>
                `;
            };

            content.innerHTML = `
                <div style="margin-bottom:25px; display: flex; gap: 10px; flex-wrap: wrap;">
                    <span class="job-tag tag-id" style="margin-bottom:0;">ID: ${job.id}</span>
                    ${isValid(job.mode) ? `<span class="job-tag tag-important">${job.mode}</span>` : ''}
                    ${isValid(job.type) ? `<span class="job-tag">${job.type}</span>` : ''}
                </div>

                <h2 style="font-family:'Syncopate'; font-size:1.6rem; margin-bottom:25px; border-bottom:1px solid #222; padding-bottom:20px; color:#fff;">
                    ${job.title.toUpperCase()}
                </h2>

                <div class="modal-body">
                    <p>${job.description}</p>

                    ${renderList('REQUIREMENTS', job.requirements)}
                    ${renderList('EXPECTATIONS', job.expectations)}
                    ${renderList('PROJECTS', job.workOn)}
                    ${renderList('GROWTH PATH', job.growthPath)}

                    <div style="display: flex; align-items: center; gap: 15px; margin-top: 40px; flex-wrap: wrap;">
                        <a href="${job.applyUrl}" target="_blank" class="apply-now" onclick="handleApply(event, '${job.applyUrl}')"
                            style="padding:18px 45px; background:#fff; color:#000; text-decoration:none; font-family:'Syncopate'; font-size:0.7rem; font-weight:700; letter-spacing:3px; transition: opacity 0.3s;">
                            APPLY FOR POSITION
                        </a>
                        
                        <button onclick="shareJob('${job.id}')" title="Share this job"
                            style="background: transparent; border: 1px solid rgba(255,255,255,0.2); padding: 13px 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s;"
                            onmouseover="this.style.borderColor='#d4af37'; this.style.backgroundColor='rgba(255,255,255,0.05)'"
                            onmouseout="this.style.borderColor='rgba(255,255,255,0.2)'; this.style.backgroundColor='transparent'">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="#fff" viewBox="0 0 24 24">
                                <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('jobModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('jobModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = function (event) {
            const modal = document.getElementById('jobModal');
            if (event.target == modal) closeModal();
        }

        // --- SHARE & NOTIFICATION LOGIC ---
        function showNotification(message) {
            const notif = document.getElementById('globalNotification');
            document.getElementById('notificationMsg').innerHTML = message;
            notif.style.display = 'flex';
        }

        function closeNotification() {
            document.getElementById('globalNotification').style.display = 'none';
        }

        function handleApply(event, url) {
            if (!url || url === 'undefined' || url.trim() === '' || (!url.startsWith('http') && !url.includes('forms'))) {
                event.preventDefault();
                showNotification("There was an error at our side. We are trying to fix it soon, please be patient.<br><br>For any issues, please <a href='index.html#contact'>contact us</a>.");
            }
        }

        async function shareJob(id) {
            const urlToShare = window.location.origin + window.location.pathname + '?jobId=' + id;

            try {
                await navigator.clipboard.writeText(urlToShare);
                if (navigator.share) {
                    await navigator.share({
                        title: 'EvoRES Careers',
                        text: 'Check out this job opening at EvoRES Technology LLP!',
                        url: urlToShare
                    });
                } else {
                    showNotification("Job link copied to clipboard successfully!");
                }
            } catch (error) {
                console.error("Error sharing link:", error);
                showNotification("Job link copied to clipboard successfully!");
            }
        }

        function checkUrlForJob() {
            const params = new URLSearchParams(window.location.search);
            const jobId = params.get('jobId');

            if (jobId) {
                const job = jobsData.find(j => String(j.id) === String(jobId));
                if (job) {
                    openModal(job.id);
                } else {
                    showNotification("This job was closed or could not be found. Please check the website for other available jobs.");
                }
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        document.getElementById('jobSearch').addEventListener('input', handleFilters);
        document.getElementById('modeFilter').addEventListener('change', handleFilters);
        document.getElementById('typeFilter').addEventListener('change', handleFilters);
        document.getElementById('locationFilter').addEventListener('change', handleFilters);

        loadCareers();
    </script>
</body>

</html>
